// Root project build file
// Read version from the VERSION file in the repo root
version = new File("${rootDir}/VERSION").text.trim()

// Packages every file inside src/ into source_.jar as-is (preserving paths)
task sourceJar(type: Jar) {
    archiveFileName = 'source_.jar'
    destinationDirectory = rootDir
    from('src') {
        into 'src'
    }
}
