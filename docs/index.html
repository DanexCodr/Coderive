<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coderive · Modern language for Java 7</title>
    <style>
        @font-face {
            font-family: 'JetBrains Mono Light';
            src: url('assets/JetbrainsMono-Light.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
    </style>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/docs.css">
    <link rel="stylesheet" href="css/playground.css">
    <link rel="stylesheet" href="css/editor.css">
</head>
<body>
    <!-- Drawer Container -->
    <div id="drawer-container"></div>

    <!-- Main App Container -->
    <main id="app">
        <!-- Home Page Container -->
        <div id="homePage" class="page" data-page="home">
            <div id="home-container"></div>
        </div>

        <!-- Docs Page Container -->
        <div id="docsPage" class="page" data-page="docs">
            <div id="docs-container"></div>
        </div>

        <!-- Playground Page Container -->
        <div id="playgroundPage" class="page" data-page="playground">
            <div id="playground-container"></div>
        </div>

        <!-- Editor Page Container -->
        <div id="editorPage" class="page" data-page="editor">
            <div id="editor-container"></div>
        </div>
    </main>

    <!-- Loading indicator -->
    <div id="loading-indicator" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #e0e0e0; font-family: 'JetBrains Mono Light', monospace; z-index: 9999; background: #1a1a1a; padding: 20px; border-radius: 8px; border: 1px solid #333;">
        ⏳ Loading Coderive...
    </div>

    <!-- Error display -->
    <div id="error-display" style="position: fixed; bottom: 0; left: 0; right: 0; background: #ff4444; color: white; padding: 10px; font-family: monospace; display: none; z-index: 10000;"></div>

    <script src="js/index.js"></script>
</body>
</html>
