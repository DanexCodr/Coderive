name: Update source_.jar

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Build source_.jar
        run: ./gradlew sourceJar

      - name: Commit updated source_.jar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add source_.jar
          if git diff --cached --quiet; then
            echo "source_.jar already up to date — nothing to commit."
          else
            git commit -m "chore: update source_.jar [skip ci]"
            git push
          fi
